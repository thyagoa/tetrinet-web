<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>TetriNET: Tag Team — Bombardeiro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #0a0a0f;
      --bg2:     #10101a;
      --bg3:     #16162a;
      --border:  #2a2a4a;
      --text:    #c8c8e8;
      --text2:   #7070a0;
      --accent:  #00e5ff;
      --accent2: #7c4dff;
      --orange:  #ff6d00;
      --green:   #00e676;
      --red:     #ff1744;
      --font-pixel: 'Press Start 2P', monospace;
      --font-mono:  'Share Tech Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      overflow-x: hidden;
    }

    /* ===== HEADER ===== */
    .bomber-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      gap: 10px;
      flex-wrap: wrap;
    }
    .bomber-title {
      font-family: var(--font-pixel);
      font-size: 10px;
      color: var(--accent);
    }
    .bomber-title span { color: var(--accent2); }
    .bomber-title .tag { color: var(--orange); font-size: 8px; display: block; margin-top: 4px; }
    .bomber-status {
      font-family: var(--font-pixel);
      font-size: 7px;
      letter-spacing: 1px;
      padding: 4px 8px;
      border-radius: 3px;
    }
    .bomber-status.connecting { color: var(--text2); background: var(--bg3); }
    .bomber-status.linked     { color: #000; background: var(--green); }
    .bomber-status.error      { color: #fff; background: var(--red); }

    /* ===== LAYOUT ===== */
    .bomber-main {
      display: flex;
      flex-direction: column;
      padding: 12px;
      gap: 12px;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ===== SECTION LABELS ===== */
    .section-label {
      font-family: var(--font-pixel);
      font-size: 8px;
      color: var(--text2);
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    /* ===== PARTNER BOARD ===== */
    .partner-board-wrap {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px;
    }
    .partner-board-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .partner-name {
      font-family: var(--font-pixel);
      font-size: 9px;
      color: var(--accent);
    }
    .partner-score {
      font-family: var(--font-pixel);
      font-size: 7px;
      color: var(--text2);
    }
    #partnerCanvas {
      display: block;
      margin: 0 auto;
      image-rendering: pixelated;
      border: 1px solid var(--border);
    }

    /* ===== INVENTORY ===== */
    .inventory-wrap {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px;
    }
    .inventory-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }
    .inv-slot {
      display: flex; flex-direction: column; align-items: center;
      gap: 3px; padding: 6px 4px;
      border: 2px solid var(--border); border-radius: 4px;
      background: var(--bg3); cursor: pointer;
      transition: border-color .1s, opacity .1s;
      min-width: 0; user-select: none;
    }
    .inv-slot.empty { opacity: 0.30; cursor: default; pointer-events: none; }
    .inv-slot.selected { border-color: var(--orange); box-shadow: 0 0 10px rgba(255,109,0,0.27); }
    .inv-slot-letter { font-family: var(--font-pixel); font-size: 14px; font-weight: bold; line-height: 1; }
    .inv-slot-name   { font-family: var(--font-mono); font-size: 5px; color: var(--text2); text-align: center; }
    .inv-slot-count  { font-family: var(--font-pixel); font-size: 7px; color: var(--text2); }
    .inv-slot.selected .inv-slot-count { color: var(--orange); }
    .bomb-disabled   { color: var(--text2); }

    /* ===== TARGETS ===== */
    .targets-wrap {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px;
    }
    .targets-grid {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .target-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 6px;
      border-radius: 4px;
      border: 2px solid var(--border);
      cursor: pointer;
      transition: border-color .1s;
      min-width: 60px;
    }
    .target-card.selected-target {
      border-color: var(--orange);
      box-shadow: 0 0 8px var(--orange);
    }
    .target-card.dead { opacity: 0.3; pointer-events: none; }
    .target-name {
      font-family: var(--font-pixel);
      font-size: 6px;
      color: var(--text);
      text-align: center;
      word-break: break-all;
    }

    /* ===== ACTION BAR ===== */
    .action-bar {
      position: sticky;
      bottom: 0;
      background: var(--bg2);
      border-top: 1px solid var(--border);
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .target-nav {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .nav-btn {
      flex: 0 0 52px;
      height: 44px;
      font-family: var(--font-pixel);
      font-size: 14px;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 4px;
      cursor: pointer;
      transition: background .1s;
    }
    .nav-btn:active { background: var(--border); }
    .target-label {
      flex: 1;
      font-family: var(--font-pixel);
      font-size: 8px;
      color: var(--orange);
      text-align: center;
      letter-spacing: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .fire-btn {
      width: 100%;
      height: 60px;
      font-family: var(--font-pixel);
      font-size: 14px;
      letter-spacing: 3px;
      background: var(--orange);
      color: #000;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: transform .1s, filter .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .fire-btn:active { transform: scale(0.97); filter: brightness(0.85); }
    .fire-btn:disabled {
      background: var(--bg3);
      color: var(--text2);
      cursor: not-allowed;
    }

    /* ===== WAITING STATE ===== */
    .waiting-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: 16px;
      padding: 24px;
      text-align: center;
    }
    .waiting-icon { font-size: 48px; }
    .waiting-title {
      font-family: var(--font-pixel);
      font-size: 11px;
      color: var(--orange);
      letter-spacing: 2px;
    }
    .waiting-sub {
      font-family: var(--font-pixel);
      font-size: 8px;
      color: var(--text2);
      line-height: 1.8;
    }
    .waiting-dot { animation: blink 1s step-end infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ===== BOMB COLORS ===== */
    .bomb-a { color: #ff1744; }
    .bomb-c { color: #00e676; }
    .bomb-b { color: #40c4ff; }
    .bomb-r { color: #ff9100; }
    .bomb-o { color: #ff6d00; }
    .bomb-q { color: #e040fb; }
    .bomb-g { color: #64dd17; }
    .bomb-s { color: #00e5ff; }
    .bomb-n { color: #ffffff; }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="bomber-header">
    <div class="bomber-title">
      TETRI<span>NET</span>
      <span class="tag">🎯 BOMBARDEIRO</span>
    </div>
    <div class="bomber-status connecting" id="statusBadge">CONECTANDO...</div>
  </header>

  <!-- WAITING SCREEN (shown until bomber_linked) -->
  <div class="waiting-screen" id="waitingScreen">
    <div class="waiting-icon">🎯</div>
    <div class="waiting-title">BOMBARDEIRO</div>
    <div class="waiting-sub" id="waitingText">
      AGUARDANDO CONEXÃO<span class="waiting-dot">...</span><br><br>
      SALA: <span id="waitingRoom">—</span><br>
      SLOT: <span id="waitingSlot">—</span>
    </div>
  </div>

  <!-- MAIN CONTENT (hidden until bomber_linked) -->
  <div id="mainContent" style="display:none">

    <div class="bomber-main">

      <!-- PARTNER BOARD -->
      <div class="partner-board-wrap">
        <div class="partner-board-header">
          <span class="partner-name" id="partnerName">PARCEIRO</span>
          <span class="partner-score" id="partnerScore">PONTOS: 0</span>
        </div>
        <canvas id="partnerCanvas"></canvas>
      </div>

      <!-- INVENTORY -->
      <div class="inventory-wrap">
        <div class="section-label">INVENTÁRIO DE BOMBAS</div>
        <div class="inventory-grid" id="inventoryGrid">
          <div class="inv-empty">Sem bombas no inventário</div>
        </div>
      </div>

      <!-- TARGETS -->
      <div class="targets-wrap">
        <div class="section-label">ALVOS</div>
        <div class="targets-grid" id="targetsGrid"></div>
      </div>

      <!-- Spacer so action bar doesn't cover content -->
      <div style="height: 140px"></div>
    </div>

    <!-- ACTION BAR (sticky bottom) -->
    <div class="action-bar">
      <div class="target-nav">
        <button class="nav-btn" id="prevTargetBtn">◄</button>
        <div class="target-label" id="targetLabel">— SEM ALVO —</div>
        <button class="nav-btn" id="nextTargetBtn">►</button>
      </div>
      <button class="fire-btn" id="fireBtn" disabled>🔥 DISPARAR</button>
    </div>

  </div>

  <script src="../js/config.js"></script>
  <script src="../js/bomb-icons.js"></script>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script>
    // ===== URL PARAMS =====
    // Token opaco lido do pathname (/b/:token)
    const BOMBER_TOKEN = window.location.pathname.split('/').pop() || '';
    const BOMBER_NAME  = localStorage.getItem('tetrinet_player_name') || 'BOMBARDEIRO';

    document.getElementById('waitingRoom').textContent = '—';
    document.getElementById('waitingSlot').textContent = '—';

    // ===== CONSTANTS =====
    const COLS = 12, ROWS = 22;
    const CELL_SIZE = 14; // smaller for mobile

    const SPECIAL_NAMES = {
      a:'Add Line',  c:'Clear Line', b:'Clear Specials',
      r:'Random',    o:'Block Bomb', q:'Blockquake',
      g:'Gravity',   s:'Switch',     n:'Nuke',
    };
    const BOMB_COLORS = {
      a:'#ff1744', c:'#00e676', b:'#40c4ff', r:'#ff9100',
      o:'#ff6d00', q:'#e040fb', g:'#64dd17', s:'#00e5ff', n:'#ffffff',
    };
    const PIECE_COLORS = {
      1:'#00e5ff', 2:'#ffea00', 3:'#d500f9', 4:'#ff6d00',
      5:'#2979ff', 6:'#00e676', 7:'#ff1744', 8:'#808080',
    };

    // ===== STATE =====
    let inventory        = [];
    let selectedBombType = null;
    let selectedTarget = null;
    let targets        = []; // [{ id, name, alive, grid, score }]
    let moverId        = null;
    let moverName      = 'PARCEIRO';

    // ===== CANVAS =====
    const canvas = document.getElementById('partnerCanvas');
    canvas.width  = COLS * CELL_SIZE;
    canvas.height = ROWS * CELL_SIZE;
    const ctx = canvas.getContext('2d');

    function drawBoard(grid) {
      ctx.fillStyle = '#0a0a0f';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      if (!grid) return;
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const v = grid[r]?.[c] || 0;
          if (!v) continue;
          ctx.fillStyle = PIECE_COLORS[v] || '#888';
          ctx.fillRect(c * CELL_SIZE + 1, r * CELL_SIZE + 1, CELL_SIZE - 2, CELL_SIZE - 2);
        }
      }
    }

    // ===== INVENTORY RENDER =====
    function renderInventory() {
      const grid = document.getElementById('inventoryGrid');
      grid.innerHTML = '';

      const counts = {};
      Object.keys(SPECIAL_NAMES).forEach(k => { counts[k] = 0; });
      inventory.forEach(sp => { if (counts[sp] !== undefined) counts[sp]++; });

      const useIcons = typeof bombTheme !== 'undefined' && bombTheme === 'icons';

      Object.entries(SPECIAL_NAMES).forEach(([key, name]) => {
        const count  = counts[key];
        const active = count > 0;
        const sel    = active && selectedBombType === key;

        const slot = document.createElement('div');
        slot.className = 'inv-slot' + (sel ? ' selected' : '') + (!active ? ' empty' : '');
        if (sel) slot.style.borderColor = BOMB_COLORS[key];

        if (useIcons) {
          slot.appendChild(makeBombIconEl(key, 20));
        } else {
          const letterEl = document.createElement('span');
          letterEl.className = 'inv-slot-letter ' + (active ? 'bomb-' + key : 'bomb-disabled');
          letterEl.textContent = key.toUpperCase();
          slot.appendChild(letterEl);
        }

        const nameEl = document.createElement('span');
        nameEl.className = 'inv-slot-name';
        nameEl.textContent = name;
        slot.appendChild(nameEl);

        const countEl = document.createElement('span');
        countEl.className = 'inv-slot-count';
        countEl.textContent = 'x' + count;
        slot.appendChild(countEl);

        if (active) {
          slot.addEventListener('click', () => {
            selectedBombType = (selectedBombType === key) ? null : key;
            renderInventory();
            updateFireBtn();
          });
        }
        grid.appendChild(slot);
      });

      updateFireBtn();
    }

    // ===== TARGETS RENDER =====
    function renderTargets() {
      const grid = document.getElementById('targetsGrid');
      grid.innerHTML = '';
      targets.forEach(t => {
        const card = document.createElement('div');
        card.className = 'target-card'
          + (t.id === selectedTarget ? ' selected-target' : '')
          + (!t.alive ? ' dead' : '');

        // Mini canvas
        const mc = document.createElement('canvas');
        const mcSize = 6;
        mc.width  = COLS * mcSize;
        mc.height = ROWS * mcSize;
        mc.style.border = '1px solid #2a2a4a';
        const mctx = mc.getContext('2d');
        mctx.fillStyle = '#0a0a0f';
        mctx.fillRect(0, 0, mc.width, mc.height);
        if (t.grid) {
          for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
              const v = t.grid[r]?.[c] || 0;
              if (!v) continue;
              mctx.fillStyle = PIECE_COLORS[v] || '#888';
              mctx.fillRect(c * mcSize + 1, r * mcSize + 1, mcSize - 2, mcSize - 2);
            }
          }
        }

        const name = document.createElement('div');
        name.className = 'target-name';
        name.textContent = t.name.slice(0, 8);

        card.appendChild(mc);
        card.appendChild(name);
        card.addEventListener('click', () => {
          selectedTarget = t.id;
          renderTargets();
          updateTargetLabel();
          updateFireBtn();
        });
        grid.appendChild(card);
      });

      updateTargetLabel();
      updateFireBtn();
    }

    function updateTargetLabel() {
      const lbl = document.getElementById('targetLabel');
      const t = targets.find(t => t.id === selectedTarget);
      lbl.textContent = t ? t.name.toUpperCase() : '— SEM ALVO —';
    }

    function navigateTarget(dir) {
      const alive = targets.filter(t => t.alive);
      if (!alive.length) return;
      const idx = alive.findIndex(t => t.id === selectedTarget);
      let next;
      if (idx === -1) {
        next = alive[0];
      } else {
        next = dir === 'next'
          ? alive[(idx + 1) % alive.length]
          : alive[(idx - 1 + alive.length) % alive.length];
      }
      selectedTarget = next.id;
      renderTargets();
      updateTargetLabel();
      updateFireBtn();
    }

    function updateFireBtn() {
      const btn = document.getElementById('fireBtn');
      const hasAmmo = selectedBombType !== null && inventory.some(s => s === selectedBombType);
      btn.disabled = !(hasAmmo && selectedTarget !== null);
    }

    // ===== FIRE =====
    function fireBomb() {
      if (!selectedBombType || !selectedTarget || !socket || !moverId) return;
      if (!inventory.some(s => s === selectedBombType)) return;

      socket.emit('use_special', { attackerId: moverId, targetId: selectedTarget, special: selectedBombType });

      // Remoção otimista de uma unidade do tipo selecionado
      const idx = inventory.indexOf(selectedBombType);
      if (idx !== -1) inventory.splice(idx, 1);

      // Desselecionar se acabou
      if (!inventory.some(s => s === selectedBombType)) selectedBombType = null;

      renderInventory();
    }

    // ===== SOCKET =====
    let socket = null;

    function connect() {
      if (typeof SERVER_URL === 'undefined' || !SERVER_URL) {
        setStatus('error', 'SEM SERVIDOR');
        document.getElementById('waitingText').innerHTML =
          'Este modo requer conexão<br>com o servidor online.';
        return;
      }

      socket = io(SERVER_URL, { transports: ['websocket'] });

      socket.on('connect', () => {
        setStatus('connecting', 'AGUARDANDO...');
        socket.emit('bomber_join', {
          token:      BOMBER_TOKEN,
          bomberName: BOMBER_NAME,
        });
      });

      socket.on('connect_error', () => setStatus('error', 'ERRO DE CONEXÃO'));
      socket.on('disconnect',    () => setStatus('connecting', 'RECONECTANDO...'));

      // Bomber linked — initial state
      socket.on('bomber_linked', ({ mover, inventoryData, boards, players }) => {
        moverId   = mover.id;
        moverName = mover.name;
        inventory = inventoryData || [];
        selectedInvIdx = inventory.length > 0 ? 0 : null;

        document.getElementById('partnerName').textContent = moverName;
        document.getElementById('waitingScreen').style.display = 'none';
        document.getElementById('mainContent').style.display  = 'block';
        setStatus('linked', '● VINCULADO');

        // Build targets from other players
        buildTargets(players, mover.id, boards);
        renderInventory();
        renderTargets();

        // Draw mover board
        const moverBoard = boards?.find(b => b.id === mover.id);
        if (moverBoard) drawBoard(moverBoard.grid);
      });

      // Inventory changed (mover collected or used bomb)
      socket.on('inventory_update', ({ inventory: inv }) => {
        inventory = inv || [];
        if (selectedBombType !== null && !inventory.some(s => s === selectedBombType)) {
          selectedBombType = null;
        }
        renderInventory();
      });

      // Board updates — mover + enemies
      socket.on('board_update', ({ boards }) => {
        boards.forEach(b => {
          if (b.id === moverId) {
            drawBoard(b.grid);
            document.getElementById('partnerScore').textContent = 'PONTOS: ' + (b.score || 0);
          }
          const t = targets.find(t => t.id === b.id);
          if (t) {
            t.grid  = b.grid;
            t.score = b.score;
            renderTargets();
          }
        });
      });

      // Player died
      socket.on('player_dead', ({ playerId }) => {
        const t = targets.find(t => t.id === playerId);
        if (t) { t.alive = false; renderTargets(); }
        if (selectedTarget === playerId) {
          const alive = targets.filter(t => t.alive);
          selectedTarget = alive.length ? alive[0].id : null;
          updateTargetLabel();
          updateFireBtn();
        }
      });

      // Game ended
      socket.on('game_over', () => {
        setStatus('connecting', 'JOGO ENCERRADO');
        document.getElementById('fireBtn').disabled = true;
      });
    }

    function buildTargets(players, myMoverId, boards) {
      targets = (players || [])
        .filter(p => p.id !== myMoverId && !p.isSpectator)
        .map(p => {
          const board = boards?.find(b => b.id === p.id);
          return { id: p.id, name: p.name, alive: p.alive !== false, grid: board?.grid || null, score: board?.score || 0 };
        });
      if (targets.length > 0) selectedTarget = targets[0].id;
    }

    function setStatus(type, text) {
      const el = document.getElementById('statusBadge');
      el.className = 'bomber-status ' + type;
      el.textContent = text;
    }

    // ===== BUTTON EVENTS =====
    document.getElementById('prevTargetBtn').addEventListener('click', () => navigateTarget('prev'));
    document.getElementById('nextTargetBtn').addEventListener('click', () => navigateTarget('next'));
    document.getElementById('fireBtn').addEventListener('click', fireBomb);

    // ===== INIT =====
    if (!BOMBER_TOKEN || BOMBER_TOKEN.length < 8) {
      setStatus('error', 'LINK INVÁLIDO');
      document.getElementById('waitingText').innerHTML =
        'Link inválido.<br>Peça ao seu parceiro<br>um novo link.';
    } else {
      connect();
    }
  </script>
</body>
</html>
